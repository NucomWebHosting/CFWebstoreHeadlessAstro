# Deploys to frontend.nucomwebhosting.com on every push to main
name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy via SSH
        run: |
          ssh "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" bash << 'ENDSSH'
            set -e
            cd /var/www/frontend.nucomwebhosting.com
            # Discard any local changes that would block the pull
            git reset --hard HEAD
            git clean -f ecosystem.config.cjs
            git pull origin main
            npm ci
            npm run build
            # Persist uploaded images outside dist/ — survives rebuilds
            mkdir -p /var/www/frontend.nucomwebhosting.com/images
            # Restart preserves env vars set on the server (DB credentials etc.)
            # Falls back to pm2 start on first-ever deploy
            pm2 restart astro-app 2>/dev/null || pm2 start ecosystem.config.cjs
            pm2 save
          ENDSSH
